services:
  php:
    build:
      context: ./api
      target: frankenphp_prod
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - uploads:/app/public/uploads
    depends_on:
      - database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3

  pwa:
    build:
      context: ./pwa
      target: prod
    env_file:
      - .env.prod
    ports:
      - "3000:3000"
    volumes:
      - uploads:/srv/app/public/uploads
    depends_on:
      - php

  database:
    image: postgres:16-alpine
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  caddy_data:
  caddy_config:
  db_data:
  uploads:
